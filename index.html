<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USUL365</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0b0b0f;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 32px 32px;
    color: #f0ede6;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo {
    width: 100%;
    max-width: 320px;
    border-radius: 16px;
    margin: 0 auto 28px;
    display: block;
    box-shadow: 0 0 60px rgba(93,202,165,.15);
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }
  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 15px 18px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s;
  }
  .link-card:hover { border-color: #333; }
  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .yt { background: #200000; color: #FF4444; }
  .x  { background: #0f0f0f; color: #f0ede6; border: 1px solid #222; }
  .ms { background: #001810; color: #5DCAA5; }
  .link-info { flex: 1; text-align: left; }
  .link-name { font-size: 14px; font-weight: 500; display: block; }
  .link-handle { font-family: 'Space Mono', monospace; font-size: 11px; color: #555; display: block; margin-top: 2px; }
  .arrow { color: #333; }
  .counter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: .05em;
  }
  .counter img { vertical-align: middle; margin-top: 8px; opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="usul365_banner_2560x1440_yt.png" alt="USUL365">

  <div class="links">
    <a class="link-card" href="https://www.youtube.com/@usul365" target="_blank" rel="noopener">
      <div class="link-icon yt">&#9654;</div>
      <div class="link-info">
        <span class="link-name">YouTube — Yusuf Gider</span>
        <span class="link-handle">youtube.com/@usul365</span>
      </div>
      <span class="arrow">&#8594;</span>
    </a>

    <a class="link-card" href="https://x.com/yusufgider" target="_blank" rel="noopener">
      <div class="link-icon x">X</div>
      <div class="link-info">
        <span class="link-name">X — usul365</span>
        <span class="link-handle">x.com/yusufgider</span>
      </div>
      <span class="arrow">&#8594;</span>
    </a>

    <a class="link-card" href="https://apps.microsoft.com" target="_blank" rel="noopener">
      <div class="link-icon ms">W</div>
      <div class="link-info">
        <span class="link-name">Microsoft Store — USUL365 Guard</span>
        <span class="link-handle">Yakında</span>
      </div>
      <span class="arrow">&#8594;</span>
    </a>
  </div>

  <div class="counter">
    <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fusul365.com&count_bg=%235DCAA5&title_bg=%23111111&icon=&icon_color=%23E7E7E7&title=ziyaret&edge_flat=false" alt="ziyaretçi sayacı">
  </div>
</div>
</body>
</html>
